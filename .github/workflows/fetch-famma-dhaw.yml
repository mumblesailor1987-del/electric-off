name: Fetch Famma Dhaw Data

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes (minimum for free tier)
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write  # Needed to commit JSON

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Fetch and extract data
        run: node fetch-famma-dhaw.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet src/data/scraped_live.json; then
            git add src/data/scraped_live.json src/data/scraped_detailed.json
            git commit -m "chore: update famma-dhaw scraped data [skip ci]"
            git push
          else
            echo "No changes detected"
          fi