<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Famma Dhaw - Tunisia Power Outage Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    header { background: #1a1a2e; color: white; padding: 24px; border-radius: 12px; margin-bottom: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    h1 { font-size: 1.8rem; margin-bottom: 8px; }
    .subtitle { opacity: 0.8; font-size: 0.95rem; }
    .meta { display: flex; gap: 24px; margin-top: 16px; flex-wrap: wrap; font-size: 0.85rem; opacity: 0.9; }
    .meta span { background: rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 20px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .stat-value { font-size: 2rem; font-weight: 700; }
    .stat-label { color: #666; font-size: 0.85rem; margin-top: 4px; }
    .stat-on { color: #22c55e; }
    .stat-off { color: #ef4444; }
    .stat-total { color: #3b82f6; }
    .controls { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
    select, input { padding: 10px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; background: white; }
    select { min-width: 200px; }
    input[type="search"] { flex: 1; min-width: 200px; }
    .region-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .region-tab { padding: 8px 16px; background: white; border: 1px solid #ddd; border-radius: 20px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
    .region-tab:hover { border-color: #3b82f6; }
    .region-tab.active { background: #3b82f6; color: white; border-color: #3b82f6; }
    .zone-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .zone-card { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-left: 4px solid; transition: transform 0.2s, box-shadow 0.2s; }
    .zone-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
    .zone-card.power-on { border-color: #22c55e; }
    .zone-card.power-off { border-color: #ef4444; }
    .zone-card.unknown { border-color: #9ca3af; }
    .zone-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .zone-name { font-weight: 600; font-size: 1rem; color: #1a1a2e; }
    .zone-status { padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
    .zone-status.on { background: #dcfce7; color: #166534; }
    .zone-status.off { background: #fee2e2; color: #991b1b; }
    .zone-status.unknown { background: #f3f4f6; color: #374151; }
    .zone-votes { display: flex; gap: 16px; margin-bottom: 12px; font-size: 0.9rem; }
    .vote-item { display: flex; align-items: center; gap: 6px; }
    .vote-icon { font-size: 1.1rem; }
    .vote-count { font-weight: 600; color: #1a1a2e; }
    .vote-label { color: #666; font-size: 0.8rem; }
    .zone-time { font-size: 0.8rem; color: #888; display: flex; align-items: center; gap: 6px; }
    .hidden { display: none !important; }
    .loading { text-align: center; padding: 40px; color: #666; }
    .error { text-align: center; padding: 40px; color: #ef4444; }
    footer { margin-top: 40px; text-align: center; color: #888; font-size: 0.8rem; }
    @media (max-width: 600px) {
      .zone-grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>⚡ Famma Dhaw</h1>
      <p class="subtitle">Tunisia Real-Time Power Outage Tracker — Community Reports</p>
      <div class="meta">
        <span id="lastUpdate">Loading…</span>
        <span id="dataAge">—</span>
        <span>Source: <a href="https://famma-dhaw.com/" target="_blank" style="color:#93c5fd;">famma-dhaw.com</a></span>
      </div>
    </header>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-value stat-total" id="statTotal">—</div>
        <div class="stat-label">Zones Tracked</div>
      </div>
      <div class="stat-card">
        <div class="stat-value stat-on" id="statOn">—</div>
        <div class="stat-label">Power ON ✅</div>
      </div>
      <div class="stat-card">
        <div class="stat-value stat-off" id="statOff">—</div>
        <div class="stat-label">Power OFF ⛔</div>
      </div>
    </div>

    <div class="controls">
      <input type="search" id="searchInput" placeholder="🔍 Search zone…" aria-label="Search zones">
      <select id="statusFilter" aria-label="Filter by status">
        <option value="all">All Statuses</option>
        <option value="power-on">Power ON ✅</option>
        <option value="power-off">Power OFF ⛔</option>
        <option value="unknown">Unknown</option>
      </select>
      <select id="regionFilter" aria-label="Filter by region">
        <option value="all">All Regions</option>
      </select>
    </div>

    <div class="region-tabs" id="regionTabs" role="tablist" aria-label="Regions"></div>

    <div class="zone-grid" id="zoneGrid">
      <div class="loading">Loading data…</div>
    </div>

    <footer>
      <p>Data refreshed every 5 min via GitHub Actions · Community-driven, not official STEG data · Cross-reference with <a href="https://www.steg.com.tn/" target="_blank">STEG announcements</a></p>
    </footer>
  </div>

<script>
const STORAGE_KEY = 'famma-dhaw-cache';
const DATA_URL = 'famma-dhaw-data.json';

let allZones = [];
let regions = new Set();

async function loadData() {
  const grid = document.getElementById('zoneGrid');
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    allZones = data.zones || [];
    renderMeta(data);
    extractRegions();
    renderRegionTabs();
    renderZones();
  } catch (e) {
    console.error(e);
    grid.innerHTML = `<div class="error">Failed to load data: ${e.message}</div>`;
  }
}

function renderMeta(data) {
  document.getElementById('lastUpdate').textContent = 'Last update: ' + new Date(data.timestamp).toLocaleString();
  document.getElementById('statTotal').textContent = data.totalZones;
  const on = allZones.filter(z => z.status === 'power-on').length;
  const off = allZones.filter(z => z.status === 'power-off').length;
  document.getElementById('statOn').textContent = on;
  document.getElementById('statOff').textContent = off;
  
  const age = Math.round((Date.now() - new Date(data.timestamp)) / 60000);
  document.getElementById('dataAge').textContent = age <= 1 ? 'Just now' : `${age} min ago`;
}

function extractRegions() {
  regions.clear();
  allZones.forEach(z => {
    const region = guessRegion(z.name);
    z.region = region;
    regions.add(region);
  });
}

function guessRegion(name) {
  const n = name.toLowerCase();
  const map = {
    'ariana': ['ariana', 'ennasr', 'ennkhilette', 'menzah', 'soukra', 'mnihla', 'kalâat', 'raoued', 'riad el andalous', 'sidi thabet', 'soukra park'],
    'ben arous': ['ben arous', 'bennane', 'bir el bey', 'bir kassâa', 'borj cédria', 'bougarnine', 'boumhel', 'chebedda', 'el mhamdia', 'el mourouj', 'ezzahra', 'hammam lif', 'khelidia', 'mégrine', 'mghira', 'mornag', 'naassen', 'nouvelle medina', 'radès'],
    'manouba': ['chaouat', 'douar hicher', 'el jedaida', 'ksar saïd', 'manouba', 'mornaguia', 'oued ellil', 'oued gueriana', 'sanhaja', 'sidi amor', 'tebourba'],
    'béja': ['béja', 'medjez el-bab', 'nefza', 'téboursouk', 'testour', 'thibar'],
    'bizerte': ['aïn mariem', 'bizerte', 'cap zbib', 'corniche', 'el alia', 'el bhira', 'errimel', 'ghar el melh', 'jarzouna', 'mateur', 'menzel abderrahmen', 'menzel bourguiba', 'metline', 'raf raf', 'ras jebel', 'sejnane', 'sidi salem', 'sounine', 'tinja', 'touibia'],
    'gabès': ['el hamma', 'gabès sud', 'gabès ville', 'mareth', 'matmata', 'métouia', 'oudhref', 'tbelbou', 'zrig'],
    'gafsa': ['el guettar', 'gafsa ville', 'mdhilla', 'métlaoui', 'redeyef', 'sbeïtla'],
    'jendouba': ['aïn draham', 'bou salem', 'ghardimaou', 'jendouba ville', 'tabarka'],
    'kairouan': ['bou hajla', 'hajeb el ayoun', 'kairouan ville', 'oueslatia', 'sbikha'],
    'kasserine': ['fériana', 'kasserine ville', 'sbeïtla', 'sbiba', 'thala'],
    'kébili': ['douz', 'jemna', 'kébili ville', 'soukh lahad'],
    'le kef': ['dahmani', 'jerissa', 'le kef ville', 'le sers', 'tajroun'],
    'mahdia': ['chebba', 'el jem', 'ksour essef', 'mahdia ville', 'mellouleche', 'rejiche', 'salakta', 'sidi alouane', 'souassi', 'téboulba', 'touza', 'zeramdine'],
    'médenine': ['ben guerdane', 'béni khedache', 'boughrara', 'djerba aghir', 'djerba ajim', 'djerba el may', 'djerba erriadh', 'djerba guellala', 'djerba houmt souk', 'djerba mezraya', 'djerba midoun', 'djerba robbana', 'djerba sedouikech', 'médenine ville', 'zarzis'],
    'monastir': ['bembla', 'béni hassen', 'bouhjar', 'jemmal', 'khniss', 'ksar hellal', 'ksibet el mediouni', 'lamta', 'menzel kamel', 'moknine', 'monastir ville', 'ouardanine', 'sayada', 'téboulba', 'touza', 'zeramdine'],
    'nabeul': ['azmour', 'béni khalled', 'bir bouregba', 'bir challouf', 'bou argoub', 'cité afh', 'dar allouch', 'dar chaâbane', 'el haouaria', 'el mida', 'grombalia', 'hammam ghezaz', 'hammamet', 'hammamet nord', 'kélibia', 'kerker', 'kerkouane', 'korba', 'maâmoura', 'menzel horr', 'menzel temime', 'mrezga', 'nabeul ville', 'oued souhil', 'sidi daoud', 'soliman', 'takelsa', 'zaouiet jedidi'],
    'sfax': ['agareb', 'bir ali ben khalifa', 'bouzayène', 'chaffar', 'chihia', 'cité chaker', 'cité el bahri', 'cité el habib', 'cité el ons', 'cité jardin', 'el amra', 'el ghraiba', 'jebeniana', 'kerkennah', 'mahres', 'route de gremda', 'route de l\'aéroport', 'route de mahdia', 'route de saltnia', 'route de sidi mansour', 'route de sokra', 'route de teniour', 'route de tunis', 'route el aïn', 'route kaïd mohamed', 'route lafrane', 'route menzel chaker', 'route mharza', 'route tbolbi', 'sakiet eddaïer', 'sakiet ezzit', 'sfax ville'],
    'sidi bouzid': ['bir el hafey', 'cebbala', 'jilma', 'mazouna', 'meknassy', 'ouled haffouz', 'regueb', 'sidi bouzid ville', 'sidi ali ben oun'],
    'siliana': ['bousalem', 'gaâfour', 'kesra', 'makthar', 'rohia', 'siliana ville'],
    'sousse': ['akouda', 'bouficha', 'chott mariem', 'enfidha', 'hammam sousse', 'hergla', 'kalâa kebira', 'kalâa seghira', 'kondar', 'msaken', 'sidi bou ali', 'sidi el heni', 'sousse ville', 'zaouiet ksiba'],
    'tataouine': ['bir lahmar', 'dehiba', 'ghomrassen', 'remada', 'smâr', 'tataouine ville'],
    'tozeur': ['degache', 'hazoua', 'nefta', 'tamaghza', 'tozeur ville', 'tamerza'],
    'tunis': ['ariana', 'bardo', 'belvédère', 'carthage', 'cite el khadra', 'cite olympique', 'djebel jelloud', 'el menzah', 'el ouardia', 'etadhamen', 'ezzahrouni', 'gorjani', 'hels', 'incline', 'jebel jeloud', 'kharrouba', 'la goulette', 'la marsa', 'les berges du lac', 'le bardo', 'le kram', 'les jardins de carthage', 'manar', 'montplaisir', 'mornag', 'omrane', 'sidi hassine', 'sijoumi', 'tunis ville'],
    'zaghouan': ['bir mcherga', 'el fahs', 'nadhour', 'saouaf', 'zaghouan ville']
  };
  for (const [region, zones] of Object.entries(map)) {
    if (zones.some(z => n.includes(z))) return region.charAt(0).toUpperCase() + region.slice(1);
  }
  return 'Other';
}

function renderRegionTabs() {
  const container = document.getElementById('regionTabs');
  const sorted = Array.from(regions).sort();
  const allTab = `<button class="region-tab active" data-region="all" role="tab" aria-selected="true">All Regions</button>`;
  const tabs = sorted.map(r => `<button class="region-tab" data-region="${r}" role="tab" aria-selected="false">${r}</button>`).join('');
  container.innerHTML = allTab + tabs;
  
  container.querySelectorAll('.region-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      container.querySelectorAll('.region-tab').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected', 'false'); });
      btn.classList.add('active'); btn.setAttribute('aria-selected', 'true');
      document.getElementById('regionFilter').value = btn.dataset.region;
      filterZones();
    });
  });
}

function renderZones() {
  const grid = document.getElementById('zoneGrid');
  grid.innerHTML = allZones.map(zone => `
    <article class="zone-card ${zone.status}" data-name="${zone.name.toLowerCase()}" data-status="${zone.status}" data-region="${zone.region}">
      <div class="zone-header">
        <h3 class="zone-name">${escapeHtml(zone.name)}</h3>
        <span class="zone-status ${zone.status === 'power-on' ? 'on' : zone.status === 'power-off' ? 'off' : 'unknown'}">
          ${zone.statusLabel}
        </span>
      </div>
      <div class="zone-votes">
        <div class="vote-item"><span class="vote-icon">🔌</span><span class="vote-count">${zone.gridVotes}</span><span class="vote-label">Grid reports</span></div>
        <div class="vote-item"><span class="vote-icon">💡</span><span class="vote-count">${zone.lightVotes}</span><span class="vote-label">Light reports</span></div>
      </div>
      <div class="zone-time">🕐 Updated ${zone.lastUpdate}</div>
    </article>
  `).join('');
}

function filterZones() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const region = document.getElementById('regionFilter').value;
  
  document.querySelectorAll('.zone-card').forEach(card => {
    const nameMatch = card.dataset.name.includes(search);
    const statusMatch = status === 'all' || card.dataset.status === status;
    const regionMatch = region === 'all' || card.dataset.region === region;
    card.classList.toggle('hidden', !(nameMatch && statusMatch && regionMatch));
  });
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

document.getElementById('searchInput').addEventListener('input', filterZones);
document.getElementById('statusFilter').addEventListener('change', filterZones);
document.getElementById('regionFilter').addEventListener('change', filterZones);

// Auto-refresh every 5 minutes
setInterval(loadData, 5 * 60 * 1000);
loadData();
</script>
</body>
</html>
